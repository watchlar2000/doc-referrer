  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Embedded Form Test</title>
  </head>
  <body>

    <h1>Embedded Form Test (updated 6)</h1>
    <p>Current page: <code id="current-url"></code></p>
    <script>document.getElementById('current-url').textContent = window.location.href;</script>

<a href="https://weeklytest.pavementsoft.net/client-portal/web-form/45" referrerpolicy="unsafe-url">Contact Us</a>

<iframe id="pss-web-form"
		src="http://localhost:5500/api/public/web-form/45"
		frameborder="0"
		style="position: static; display: block;
		width: 100%; border: none; overflow: hidden;">
	</iframe>

    

<script>
	document.addEventListener('DOMContentLoaded', () => {
		const iframe = document.getElementById('pss-web-form');

		if (!iframe) return;

		iframe.addEventListener('load', () => {
			iframe.contentWindow.postMessage(
				{ action: 'SET_REFERRING_WEBSITE', referringWebsite: window.location.href },
				'http://localhost:5500'
			);
		});

		window.addEventListener('message', (event) => {
			switch (event.data?.action) {
				case 'SET_PSS_WEB_FORM_HEIGHT': {
					iframe.style.height = (event.data.height + 30) + 'px';
					break;
				}
				case 'PSS_WEB_FORM_REDIRECT': {
					window.location.href = event.data.redirectUrl;
					break;
				}
			}
		});
	});
</script>

  </body>
  </html>
