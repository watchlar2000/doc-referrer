  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Embedded Form Test</title>
  </head>
  <body>

    <h1>Embedded Form Test (updated 2)</h1>
    <p>Current page: <code id="current-url"></code></p>
    <script>document.getElementById('current-url').textContent = window.location.href;</script>

    <iframe id="pss-web-form"
      src="https://enforceable-lela-didactically.ngrok-free.dev/api/public/web-form/45"
      frameborder="0"
      style="display: block; width: 100%; border: none; overflow: hidden; min-height: 200px;">
    </iframe>

    <script>
      const iframe = document.getElementById('pss-web-form');

      iframe.addEventListener('load', () => {
        console.log(iframe);
        
        iframe.contentWindow.postMessage(
          { action: 'SET_REFERRING_WEBSITE', referringUrl: window.location.href },
          'https://enforceable-lela-didactically.ngrok-free.dev'
        );
      });

      window.addEventListener('message', (event) => {
        switch (event.data?.action) {
          case 'SET_PSS_WEB_FORM_HEIGHT': {
            document.getElementById('pss-web-form').style.height = (event.data.height + 30) +
  'px';
            break;
          }
          case 'PSS_WEB_FORM_REDIRECT': {
            window.location.href = event.data.redirectUrl;
            break;
          }
        }
      });
    </script>

  </body>
  </html>
